name: CI Pipeline

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        working-directory: typescript
        run: npm install

      - name: Run tests
        working-directory: typescript
        run: npx jest

  test-python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: python
        run: pip install pytest

      - name: Run tests
        working-directory: python
        run: pytest

  test-cpp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install G++
        run: sudo apt-get install -y g++

      - name: Compile and run tests
        working-directory: cpp
        run: |
          g++ -o test_calculator test_calculator.cpp calculator.cpp
          ./test_calculator